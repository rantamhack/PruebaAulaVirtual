<!doctype html>
<html lang="es">
  <head>
    
    <script>
      const savedTheme = localStorage.getItem("aula-theme");
      const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const theme = savedTheme || (systemPrefersDark ? "dark" : "light");

      document.documentElement.dataset.theme = theme;

      if (theme === "dark") {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Aula Virtual transforma objetivos de aprendizaje en itinerarios claros con IA, según tu nivel, objetivo, tiempo disponible y formato preferido."
    />
    <title>Aula Virtual | Itinerarios de aprendizaje con IA</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              electric: {
                50: '#eff6ff',
                100: '#dbeafe',
                400: '#60a5fa',
                500: '#3b82f6',
                600: '#2563eb',
                800: '#1e40af',
                900: '#172554'
              }
            },
            animation: {
              'bounce-in': 'bounceIn 0.4s ease-out'
            },
            keyframes: {
              bounceIn: {
                '0%': { opacity: '0', transform: 'scale(0.95) translateY(8px)' },
                '60%': { opacity: '1', transform: 'scale(1.02) translateY(0)' },
                '100%': { opacity: '1', transform: 'scale(1) translateY(0)' }
              }
            }
          }
        }
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
