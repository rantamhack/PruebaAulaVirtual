<!doctype html>
<html lang="es">
  <head>
    
    <script>
  const themeTokens = {
    light: {
      '--bg': '#f7f4ee',
      '--surface': '#fffdf8',
      '--surface-rgb': '255, 253, 248',
      '--surface-soft': '#edf5ef',
      '--field': '#ffffff',
      '--ink': '#17211d',
      '--muted': '#5d6d66',
      '--line': '#dce4dd',
      '--primary': '#2d6a73',
      '--primary-dark': '#214f56',
      '--primary-contrast': '#ffffff',
      '--sage': '#8ead9a',
      '--sand': '#e8d7bd',
      '--blue-soft': '#dcecf2',
      '--header-bg': 'rgba(247, 244, 238, 0.78)',
      '--subtle-line': 'rgba(220, 228, 221, 0.72)',
      '--grid-line': 'rgba(23, 33, 29, 0.035)',
      '--focus': 'rgba(45, 106, 115, 0.28)',
      '--shadow': '0 24px 70px rgba(36, 56, 49, 0.12)',
      '--hero-blue': 'rgba(220, 236, 242, 0.8)',
      '--hero-sand': 'rgba(232, 215, 189, 0.55)',
      '--radius': '8px'
    },
    dark: {
      '--bg': '#13201d',
      '--surface': '#1c2926',
      '--surface-rgb': '28, 41, 38',
      '--surface-soft': '#223330',
      '--field': '#162320',
      '--ink': '#edf4ef',
      '--muted': '#becbc4',
      '--line': '#3c4f48',
      '--primary': '#8fc8c0',
      '--primary-dark': '#b9ddd7',
      '--primary-contrast': '#14211f',
      '--sage': '#9ab8a7',
      '--sand': '#cbb895',
      '--blue-soft': '#23353b',
      '--header-bg': 'rgba(19, 32, 29, 0.76)',
      '--subtle-line': 'rgba(101, 123, 113, 0.34)',
      '--grid-line': 'rgba(237, 244, 239, 0.035)',
      '--focus': 'rgba(143, 200, 192, 0.34)',
      '--shadow': '0 18px 48px rgba(5, 11, 10, 0.2)',
      '--hero-blue': 'rgba(62, 97, 104, 0.28)',
      '--hero-sand': 'rgba(128, 110, 79, 0.16)',
      '--radius': '8px'
    }
  };

  const savedTheme = localStorage.getItem("aula-theme");
  const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
  const theme = savedTheme || (systemPrefersDark ? "dark" : "light");

  document.documentElement.dataset.theme = theme;
  document.documentElement.classList.toggle("dark", theme === "dark");

  const tokens = themeTokens[theme];
  Object.entries(tokens).forEach(([key, value]) => {
    document.documentElement.style.setProperty(key, value);
  });

  localStorage.setItem("aula-theme", theme);
  localStorage.setItem("theme", theme);
</script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Aula Virtual transforma objetivos de aprendizaje en itinerarios claros con IA, según tu nivel, objetivo, tiempo disponible y formato preferido."
    />
    <title>Aula Virtual | Itinerarios de aprendizaje con IA</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              electric: {
                50: '#eff6ff',
                100: '#dbeafe',
                400: '#60a5fa',
                500: '#3b82f6',
                600: '#2563eb',
                800: '#1e40af',
                900: '#172554'
              }
            },
            animation: {
              'bounce-in': 'bounceIn 0.4s ease-out'
            },
            keyframes: {
              bounceIn: {
                '0%': { opacity: '0', transform: 'scale(0.95) translateY(8px)' },
                '60%': { opacity: '1', transform: 'scale(1.02) translateY(0)' },
                '100%': { opacity: '1', transform: 'scale(1) translateY(0)' }
              }
            }
          }
        }
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
